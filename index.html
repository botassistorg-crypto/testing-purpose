<!DOCTYPE html>
<html>
<head>
    <title>ASQVI Token Bridge</title>
    <style>body { font-family: sans-serif; text-align: center; padding-top: 100px; }</style>
</head>
<body>
    <h2>ASQVI SaaS Token Bridge</h2>
    <button id="loginBtn" onclick="startLogin()" style="padding: 20px; background: #1877f2; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Step 1: Connect to Facebook
    </button>
    <div id="status"></div>

    <script>
        const appId = "1728102054869493"; // 🟢 1. PUT YOUR APP ID HERE
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwxf1g_v1Bkp_0MX3lxLNQxh1vh2R_XZVJvKbR4JXUDmW-Vs0P1NsOkh4A-julathJO/exec"; // 🟢 2. PUT YOUR APPS SCRIPT URL HERE

        function startLogin() {
            const redirect = window.location.href;
            const url = `https://www.facebook.com/v19.0/dialog/oauth?client_id=${appId}&redirect_uri=${redirect}&scope=pages_show_list,pages_manage_posts,public_profile&response_type=token`;
            window.location.href = url;
        }

        window.onload = function() {
            const hash = window.location.hash;
            if (hash.includes("access_token=")) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('status').innerHTML = "<h3>Step 2: Sending token to Google Sheet...</h3>";
                
                const token = hash.split("access_token=")[1].split("&")[0];
                
                // Send to Google Apps Script
                fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ token: token })
                }).then(() => {
                    document.getElementById('status').innerHTML = "<h3 style='color:green'>✅ SUCCESS! Check your Google Sheet.</h3>";
                }).catch(err => {
                    document.getElementById('status').innerHTML = "<h3 style='color:red'>❌ Error sending to Sheet.</h3>";
                });
            }
        }
    </script>
</body>
</html>
