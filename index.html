<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASQVI Token Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    .logo { font-size: 22px; font-weight: 800; color: #2563eb; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-fb { background: #1877f2; color: white; }
    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      background: #0f172a;
      font-size: 13px;
      line-height: 1.8;
      display: none;
      word-break: break-all;
    }
    .status.show { display: block; }
    .success { color: #16a34a; }
    .error   { color: #ef4444; }
    .warning { color: #f59e0b; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">ASQVI</div>
  <div class="subtitle">Token Bridge — Admin Only</div>
  <label>Client ID (e.g. ASQVI-001)</label>
  <input type="text" id="clientId" placeholder="ASQVI-001" />
  <button class="btn btn-fb" id="loginBtn">Connect Facebook</button>
  <div class="status" id="status"></div>
</div>
<script>
var APP_ID     = "1728102054869493";
var VERCEL_URL = "https://conhis.vercel.app";

document.getElementById("loginBtn").onclick = function() {
  var cid = document.getElementById("clientId").value.trim().toUpperCase();
  if (!cid) {
    show("Client ID din age!", "error");
    return;
  }
  localStorage.setItem("bridge_cid", cid);
  var base = window.location.href.split("?")[0].split("#")[0];
  window.location.href = "https://www.facebook.com/v21.0/dialog/oauth" +
    "?client_id=" + APP_ID +
    "&redirect_uri=" + encodeURIComponent(base) +
    "&scope=pages_show_list,pages_manage_posts,pages_read_engagement,pages_manage_metadata,read_insights,public_profile" +
    "&response_type=code" +
    "&state=" + encodeURIComponent(cid);
};

window.onload = function() {
  var p     = new URLSearchParams(window.location.search);
  var code  = p.get("code");
  var state = p.get("state");
  var cid   = state || localStorage.getItem("bridge_cid") || "";
  var err   = p.get("error");

  if (err)   { show("FB Error: " + err, "error"); return; }
  if (!code) { return; }
  if (!cid)  { show("No Client ID!", "error"); return; }

  document.getElementById("loginBtn").style.display = "none";
  show("Token save hocche...", "warning");

  var base = window.location.href.split("?")[0].split("#")[0];

  fetch(VERCEL_URL + "/api/save-token", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({
      code:        code,
      clientId:    cid,
      redirectUri: base
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.success) {
      show("Sofol! Page: " + d.pageName + " | Token saved!", "success");
    } else {
      show("Failed: " + (d.error || "Unknown error"), "error");
    }
  })
  .catch(function(e) {
    show("Error: " + e.message, "error");
  });
};

function show(msg, type) {
  var el = document.getElementById("status");
  el.className   = "status show " + type;
  el.textContent = msg;
}
</script>
</body>
</html>
